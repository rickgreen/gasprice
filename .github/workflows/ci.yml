name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint js/**/*.js

      - name: Format check
        run: npx prettier --check '**/*.{js,json,css,html,md}'

      - name: Unit tests with coverage
        run: npm test

      - name: Security audit
        run: npx better-npm-audit audit --level moderate

      - name: Integration tests (CBS API)
        run: npm run test:integration
